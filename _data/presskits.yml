  description: "
            <h2>Summary</h2>
                <p>Coruncopia is a top-down action RPG where you take control of Nil, a mysterious old druid on a mission to defend his world against invaders from an alien realm. With a completely procedurally hand crafted world and a robust magic spell creation system boasting thousands of combinations, you'll never experience Coruncopia the same way twice!</p>
                <p>Take on eight dungeons in any order you choose as you unravel a story that brings the world of Coruncopia and its characters to life. Be warned, however – the game knows what you are capable of, and will dynamically transform itself to challenge you the closer you are to your goal! What lies before the player is a tale of mercy, but the path to the end of that journey will be anything but merciful.</p>
            <h2>Key Features</h2>
            <ul>
                <li>Explore a dynamic, procedurally hand-crafted world.</li>
                <li>Create your own custom, powerful spells using the 'Almanactor' System.</li>
                <li>Immerse in a carefully handcrafted narrative full of memorable and interesting characters in a unique setting like no other.</li>
            </ul>
            "
