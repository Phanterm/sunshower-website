baseurl: /sunshower-website
url: https://phanterm.github.io/sunshower-website/

collections:
  authors:
    output: true

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
    values:
      layout: "navbar"
      
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag