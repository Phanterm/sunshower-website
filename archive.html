---
layout: blog
title: Blog
custom_css: blog
type: archive
colorscheme: "#5FA5D3"
---
<h1 class="smallcaps">Archive</h1>
		
		<ul class="nobullet">
		  {% for post in site.posts %}
			<li>{{ post.date | date: "%Y-%m-%d" }} - 
			<a href="{{ post.url }}">{{ post.title }}</a></li>
		  {% endfor %}
		</ul>
