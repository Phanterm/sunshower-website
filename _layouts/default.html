<html>
  <head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial scale= 1.0">
    <title>{{ page.title }}</title>
	<link rel="stylesheet" href="/assets/css/styles.css">
	<style>
	
	#footer {
		color: #ffffff; /* White */
		width: 100%;
		background-color: #F95D62;
		padding-top: 6em;
	}
	
	#navimage {
		background-color: {% if page.colorscheme %}{{ page.colorscheme }}{% else %}black{% endif %};
		border: {% if page.colorscheme %}18px solid {{ page.colorscheme }}{% else %}black{% endif %};
		border-radius: 22em;
	}
	
	#animate-area { 
	background-image: url("/assets/images/background/{{page.bg-image}}");
	background-position: 0px 0px;
	background-repeat: both;

	animation: animatedBackground 60s linear infinite;
	}
		
	#activelink

	-webkit-font-smoothing: antialiased;
	}
	
	</style>
  </head>
  <body>
    <div id="animate-area">
		{% include navigation.html %}
		{% include transition.html %}
			<div class="wrapper-main">
				{{ content }}
			</div>
	</div>
	{% include footer.html %}
	<script type="text/javascript" src="/assets/js/loader.js">
	var coll = document.getElementsByClassName("rollout");
	var i;

	for (i = 0; i < coll.length; i++) {
	  coll[i].addEventListener("click", function() {
		this.classList.toggle("active");
		var content = this.nextElementSibling;
		if (content.style.display === "block") {
		  content.style.display = "none";
		} else {
		  content.style.display = "block";
		}
	  });
	}
	</script>
  </body>
</html>
