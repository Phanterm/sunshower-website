---
permalink: /
redirect_from:
  - /blog
layout: blog
title: Blog
custom_css: blog
type: archive
colorscheme: "#5FA5D3"
---
<h1 class="smallcaps">Latest Posts</h1>

		<ul>
		  {% for post in site.posts %}
			<li class="archive">
			  <h3>
			  <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
			  </h3>
			</li>
			<li class="date">{{ post.date | date: '%B %d, %Y' }}</li>
			<li class="description">
			  <p>{{ post.excerpt }}</p>
			</li>
		  {% endfor %}
		</ul>
